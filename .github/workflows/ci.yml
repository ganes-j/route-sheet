name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sanitization gate
        run: bash scripts/leak-check.sh
      - name: Helper syntax check
        run: python3 -m py_compile bin/model_staleness.py
      - name: Helper smoke test
        run: python3 bin/model_staleness.py --json
