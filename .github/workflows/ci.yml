name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sanitization gate
        run: bash scripts/leak-check.sh
      - name: Helper syntax check
        run: python3 -m py_compile bin/model_staleness.py
      - name: Helper smoke test
        run: python3 bin/model_staleness.py --json
      - name: Local drift helper unit tests
        run: python3 -m unittest tests.test_local_drift
      - name: OpenRouter helper syntax check
        run: python3 -m py_compile bin/openrouter_facts.py
      - name: OpenRouter helper unit tests
        run: python3 -m unittest tests.test_openrouter_facts
      - name: OpenRouter helper smoke test
        run: python3 bin/openrouter_facts.py --json
      - name: OpenRouter discovery helper syntax check
        run: python3 -m py_compile bin/openrouter_discovery.py
      - name: OpenRouter discovery helper unit tests
        run: python3 -m unittest tests.test_openrouter_discovery
      - name: OpenRouter discovery helper smoke test
        run: printf '' | python3 bin/openrouter_discovery.py --json
